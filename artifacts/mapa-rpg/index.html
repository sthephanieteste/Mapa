<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nossa História — Mapa Interativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>

    <!-- =============================================
         ETAPA 4: OVERLAY DE NÉVOA (fade-out ao carregar)
         ============================================= -->
    <div id="nevoa-overlay">
      <div class="nevoa-camada nevoa-1"></div>
      <div class="nevoa-camada nevoa-2"></div>
      <div class="nevoa-camada nevoa-3"></div>
    </div>

    <!-- =============================================
         CONTAINER PRINCIPAL DO MAPA
         ============================================= -->
    <div id="mapa-container">

      <!--
        ╔══════════════════════════════════════════════════════════════╗
        ║  COMO AJUSTAR AS POSIÇÕES DOS PINS                          ║
        ║                                                              ║
        ║  Cada pin usa "top" e "left" em porcentagem (%).            ║
        ║  - top: 0%  = topo da imagem                                ║
        ║  - top: 100% = base da imagem                               ║
        ║  - left: 0%  = lado esquerdo da imagem                      ║
        ║  - left: 100% = lado direito da imagem                      ║
        ║                                                              ║
        ║  O atributo data-pin-id conecta o pin ao objeto             ║
        ║  DADOS_PINS no script.js. Edite lá para mudar               ║
        ║  o conteúdo do modal.                                        ║
        ╚══════════════════════════════════════════════════════════════╝
      -->

      <!--
        ╔══════════════════════════════════════════════════════════════╗
        ║  HOTSPOTS INVISÍVEIS — ficam sobre os pins da imagem        ║
        ║                                                              ║
        ║  A imagem já tem os pins desenhados. Cada div.pin abaixo    ║
        ║  é uma área clicável transparente centralizada no pin       ║
        ║  da imagem. Ajuste top/left para alinhar com cada pin.      ║
        ║                                                              ║
        ║  top:  0% = topo   | 100% = base                            ║
        ║  left: 0% = esq.   | 100% = direita                         ║
        ╚══════════════════════════════════════════════════════════════╝
      -->

      <!-- HOTSPOT: Cristo Redentor & Praia — Rio, left side on the hilltop -->
      <div class="pin" style="top: 28%; left: 19%;" data-pin-id="rio-de-janeiro"></div>

      <!-- HOTSPOT: Ônibus do Rio — winding road bottom-left -->
      <div class="pin" style="top: 65%; left: 10%;" data-pin-id="a-viagem"></div>

      <!-- HOTSPOT: UTFPR Campus — center of map, main campus buildings -->
      <div class="pin" style="top: 35%; left: 54%;" data-pin-id="utfpr"></div>

      <!-- HOTSPOT: A Minha Casa — behind/below the university, smaller -->
      <div class="pin" style="top: 62%; left: 58%;" data-pin-id="minha-casa"></div>

      <!-- HOTSPOT: Della Pazetti — right side near campus -->
      <div class="pin" style="top: 50%; left: 76%;" data-pin-id="della-pazetti"></div>

      <!-- HOTSPOT: Cristo de Cornélio Procópio — right/center area -->
      <div class="pin" style="top: 20%; left: 72%;" data-pin-id="utfpr-guarapuava"></div>

      <!-- HOTSPOT: O Futuro — dark clouds top center -->
      <div class="pin" style="top: 6%; left: 50%;" data-pin-id="o-futuro"></div>

    </div>

    <!-- =============================================
         MODAL DE PERGAMINHO
         ============================================= -->
    <div id="modal" class="hidden">
      <div id="modal-pergaminho">

        <!-- Botão X -->
        <button id="modal-fechar" aria-label="Fechar modal">✕</button>

        <!-- Ornamentos de canto -->
        <span class="canto canto-tl">❧</span>
        <span class="canto canto-tr">❧</span>
        <span class="canto canto-bl">❧</span>
        <span class="canto canto-br">❧</span>

        <!-- Título centralizado (estilo capítulo de livro) -->
        <div id="modal-cabecalho">
          <div id="modal-icone">📍</div>
          <h2 id="modal-titulo">Título do Local</h2>
        </div>

        <hr class="divisor">

        <!-- Álbum de Memórias (acima do texto) -->
        <div id="modal-album" class="hidden">
          <div id="album-grid">
            <!-- Miniaturas 3×2 injetadas pelo script.js -->
          </div>
          <hr class="divisor divisor-album">
        </div>

        <!-- Texto descritivo (abaixo das fotos) -->
        <p id="modal-texto">Descrição do local.</p>

        <!-- Contador de dias -->
        <div id="modal-contador" class="hidden">
          <span class="contador-label">Juntos há</span>
          <span id="contador-dias">0</span>
          <span class="contador-label">dias</span>
          <span class="contador-coracao">♥</span>
        </div>

        <!-- Rodapé decorativo -->
        <div id="modal-rodape">
          <span class="rodape-scroll">📜</span>
        </div>

      </div>
    </div>

    <!-- Lightbox (visualizador de foto em tela cheia) -->
    <div id="lightbox" class="hidden">
      <button id="lightbox-fechar" aria-label="Fechar">✕</button>
      <button id="lightbox-anterior" aria-label="Anterior">&#8249;</button>
      <button id="lightbox-proximo"  aria-label="Próximo">&#8250;</button>
      <div id="lightbox-conteudo">
        <img id="lightbox-img" src="" alt="">
        <p id="lightbox-legenda"></p>
      </div>
    </div>

    <!-- =============================================
         ETAPA 3: PLAYER DE ÁUDIO (minimalista)
         ============================================= -->
    <div id="audio-player">
      <button id="btn-mudo" title="Alternar som">🔊</button>
      <span id="audio-track-nome"></span>
    </div>

    <!-- Hint de arraste (visível apenas no mobile, some em 4 s) -->
    <div id="hint-arraste">
      <span>👆</span>
      <span>Arraste para explorar o mapa</span>
    </div>

    <audio id="audio-elemento" preload="none"></audio>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
